name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm -r build

      - name: Package plugin
        run: |
          cd packages/plugin
          pnpm pack
          mv *.tgz ../../clawlens-plugin.tgz

      - name: Package UI
        run: |
          cd packages/ui
          tar -czf ../../clawlens-ui-dist.tar.gz dist/

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
          fi

          # Save to output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ClawLens v${{ steps.version.outputs.version }}
          body: |
            ## ClawLens v${{ steps.version.outputs.version }}

            Investigation and debugging layer for OpenClaw

            ### Installation

            ```bash
            # Install the plugin
            npm install @clawlens/plugin@${{ steps.version.outputs.version }}
            ```

            ### Changes

            ${{ steps.changelog.outputs.changelog }}

            ### Assets

            - `clawlens-plugin.tgz` - ClawLens OpenClaw plugin package
            - `clawlens-ui-dist.tar.gz` - Pre-built UI assets

            ### Documentation

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
          files: |
            clawlens-plugin.tgz
            clawlens-ui-dist.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
